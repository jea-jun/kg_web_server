<!doctype html>
<html lang="en">
	<head>
		<!-- Required meta tags -->
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

		<!-- Bootstrap CSS -->
		<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
			  integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">

		<title>WEBCAM STREAMING</title>
	</head>
	<body>
		<div class="container">
			<div class="row">
				<div class="col-lg-8 offset-lg-2">
					<h3 class="mt-5">Live Streaming</h3>
					<!-- 비디오 엘리먼트를 사용하여 사용자 로컬 카메라 스트림 표시 -->
					<video id="videoElement" class="img-fluid" autoplay playsinline></video>
				</div>
				<div class="col-lg-8 offset-lg-2 mt-3">
					<!-- 카메라 상태를 제어하는 버튼 -->
					<a href="{{ url_for('push_switch') }}"><input type="button" class="btn btn-primary" value="On/Off"></a>
					<b>
						{% if push_btn != 0 %}
							카메라 상태: Off
						{% elif push_btn == 0 %}
							카메라 상태: On
						{% endif %}
					</b>
				</div>
			</div>
		</div>

		<!-- 사용자 로컬 카메라 접근을 위한 JavaScript -->
		<script>
			const video = document.getElementById('videoElement');

			// 사용자의 로컬 카메라 접근
			navigator.mediaDevices.getUserMedia({ video: true })
				.then((stream) => {
					video.srcObject = stream; // 비디오 엘리먼트에 스트림 설정
				})
				.catch((err) => {
					console.error("Error accessing the camera: ", err);
				});
		</script>
	</body>
</html>
